name: shakti
description: "AI-Powered Women Safety App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  lottie: ^3.3.1
  animated_text_kit: ^4.2.2
  salomon_bottom_bar: ^3.3.2
  http: ^1.6.0
  flutter_carousel_widget: ^3.1.0
  flutter_secure_storage: ^9.2.4
  flutter_carousel_slider: ^1.1.0
  carousel_slider: ^5.1.1
  google_sign_in: ^6.2.4
  shared_preferences: ^2.2.2
  curved_labeled_navigation_bar: ^2.0.2
  google_maps_flutter: ^2.5.0
  flutter_swipe_button: ^2.1.3
  # Chatbot dependencies
  font_awesome_flutter: ^10.7.0
  flutter_tts: ^4.2.2
  flutter_markdown: ^0.7.4
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  http_parser: ^4.1.2
  speech_to_text: ^7.0.0
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  mapbox_maps_flutter: ^2.24.3
  geolocator: ^14.0.2
  google_fonts: ^8.1.0
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/voiceAsistant.png
    - assets/sosimagewomen.png
    - assets/legal.png
    - assets/blackmail.png
    - assets/safelocation.png
    - assets/health.png
